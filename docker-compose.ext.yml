# Lean deploy: app + local Redis container. Mongo from Atlas (MONGO_URL in .env).
# Usage:
#   docker compose -f docker-compose.ext.yml --env-file .env up --build -d
#
# Default REDIS_URL is redis://redis:6379 (container name). Override in .env only if
# you use an external Redis (not recommended on free tiers).
#
# One shared image: only scheduler defines build (avoids parallel BuildKit jobs on small VMs).
# pull_policy: never stops Compose from trying to pull price-tracker-app from Docker Hub.

x-app: &app
  image: price-tracker-app:latest
  pull_policy: never

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  scheduler:
    <<: *app
    build: .
    command: node scheduler.js
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      redis:
        condition: service_healthy

  listing-worker:
    <<: *app
    command: node listing-worker.js
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      scheduler:
        condition: service_started
      redis:
        condition: service_healthy

  product-worker:
    <<: *app
    command: node product-worker.js
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MONGO_URL: ${MONGO_URL}
    depends_on:
      scheduler:
        condition: service_started
      redis:
        condition: service_healthy

  web:
    <<: *app
    command: node server.js
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      MONGO_URL: ${MONGO_URL}
      PORT: 3000
    depends_on:
      scheduler:
        condition: service_started

  seed:
    <<: *app
    command: node seed.js
    environment:
      NODE_ENV: production
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - seed
