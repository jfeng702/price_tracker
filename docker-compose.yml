services:
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    # volumes:
    #   - redis_data:/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      # Mount data/log directly — the image declares anonymous volumes here
      # which override a parent mount and are wiped on container remove.
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9093:9093"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "bash", "-c", "nc -z localhost 9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  scheduler:
    build: .
    command: node scheduler.js
    environment:
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
      KAFKA_BROKER: kafka:9092
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  listing-worker:
    build: .
    command: node listing-worker.js
    environment:
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
      KAFKA_BROKER: kafka:9092
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  product-worker:
    build: .
    command: node product-worker.js
    environment:
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
      KAFKA_BROKER: kafka:9092
      MONGO_URL: mongodb://mongo:27017
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy

  web:
    build: .
    command: sh -c "npm ci --prefix client && npm run build --prefix client && node server.js"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      MONGO_URL: mongodb://mongo:27017
      PORT: 3000
    volumes:
      - .:/app
    depends_on:
      mongo:
        condition: service_healthy

  seed:
    build: .
    command: node seed.js
    environment:
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - seed

volumes:
  mongo_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
  # redis_data:
