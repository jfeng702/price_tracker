services:
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  scheduler:
    build: .
    command: node scheduler.js
    environment:
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      redis:
        condition: service_healthy

  listing-worker:
    build: .
    command: node listing-worker.js
    environment:
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/app
      - node_modules:/app/node_modules

    depends_on:
      redis:
        condition: service_healthy

  product-worker:
    build: .
    command: node product-worker.js
    environment:
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
      MONGO_URL: mongodb://mongo:27017
    volumes:
      - .:/app
      - node_modules:/app/node_modules

    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy

  web:
    build: .
    command: sh -c "npm ci --prefix client --include=dev && npm run build --prefix client && node server.js"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      MONGO_URL: mongodb://mongo:27017
      PORT: 3000
      API_KEY: ${API_KEY:-}
    volumes:
      - .:/app
      - node_modules:/app/node_modules

    depends_on:
      mongo:
        condition: service_healthy

  seed:
    build: .
    command: node seed.js
    environment:
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/app
      - node_modules:/app/node_modules

    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - seed

volumes:
  mongo_data:
  node_modules:
